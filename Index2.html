<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Best Platform</title>
    <style>
        /* Premium Dark Mode Template (ZNU Style Customization) */
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent-blue: #38bdf8;
            --accent-red: #ef4444;
            --accent-purple: #a855f7;
            --text-white: #f8fafc;
            --border-color: #334155;
            --accent-green: #22c55e;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-white);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ------------------------------------ */
        /* PREMIUM LOGIN SCREEN */
        /* ------------------------------------ */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1e1b4b 0%, var(--bg-main) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: 0.5s ease-in-out;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        .login-card h1 {
            font-size: 36px;
            color: var(--accent-blue);
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .login-card p {
            font-size: 16px;
            color: var(--text-white);
            margin-bottom: 30px;
        }
